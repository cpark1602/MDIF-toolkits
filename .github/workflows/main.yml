name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      # 1. Download code onto the GitHub runner
      - uses: actions/checkout@v4

      # 2. Set up the specific Python runtime from the matrix
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Upgrade core pip tools and install testing frameworks
      - name: Install testing dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install ruff pytest  # <-- Changed flake8 to ruff

      # 4. Install actual package along with its requirements
      - name: Install MDIF-toolkits
        run: |
          pip install .

      # 5. Syntax check: Catch formatting flaws or broken imports before they break runtime
      - name: Lint with Ruff
        run: |
          # Fails the build on critical Python syntax errors (like undefined names)
          ruff check . #--select E,W,F,B,ARG,PERF,EM,LOG,UP,SIM,PL

      # 6. Run automated unit tests
      - name: Test with pytest
        run: |
          pytest
